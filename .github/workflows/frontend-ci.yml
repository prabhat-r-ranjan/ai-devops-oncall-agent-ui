name: Frontend CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  IMAGE_NAME: ai-devops-oncall-agent-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.AZURE_REGISTRY_PASSWORD }}" | docker login $REGISTRY \
            -u "${{ secrets.AZURE_REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            .

          docker tag \
            $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            $REGISTRY/$IMAGE_NAME:latest

      - name: Push Docker images
        run: |
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Update Kubernetes deployment image
        run: |
          sed -i "s|image: $REGISTRY/$IMAGE_NAME:.*|image: $REGISTRY/$IMAGE_NAME:${{ github.sha }}|" k8s/base/ui-deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/base/ui-deployment.yaml

          git commit -m "Update UI image to ${{ github.sha }}" || echo "No changes"

          git push
