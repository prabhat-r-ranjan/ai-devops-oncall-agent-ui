apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-devops-oncall-agent-health-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /health
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/health
            pathType: Exact
            backend:
              service:
                name: ai-devops-oncall-agent
                port:
                  number: 8000